<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>TaskFlow — To Do</title>
</head>
<body>

    <div class="bg-orbs">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <main class="app-wrapper">

        <div class="app-header">
            <div class="logo-mark">✦</div>
            <h1 class="app-title">TaskFlow</h1>
            <p class="app-subtitle">Stay focused. Get things done.</p>
        </div>

        <div class="boards-grid">

            <div class="board" id="board1">
                <div class="board-header">
                    <span class="board-icon">🎯</span>
                    <h2 class="board-title">My Tasks</h2>
                    <!-- <span class="task-count" id="count1">0</span> -->
                </div>
                <div class="input-row">
                    <input id="input1" type="text" placeholder="Add a new task…" autocomplete="off">
                    <button id="addBtn1" aria-label="Add task">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="addElement1" class="task-list-wrap"></div>
            </div>

            <div class="board" id="board2">
                <div class="board-header">
                    <span class="board-icon">⚡</span>
                    <h2 class="board-title">In Progress</h2>
                    <!-- <span class="task-count" id="count2">0</span> -->
                </div>
                <div class="input-row">
                    <input id="input2" type="text" placeholder="Add a new task…" autocomplete="off">
                    <button id="addBtn2" aria-label="Add task">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="addElement2" class="task-list-wrap"></div>
            </div>

            <div class="board" id="board3">
                <div class="board-header">
                    <span class="board-icon">✅</span>
                    <h2 class="board-title">Completed</h2>
                    <!-- <span class="task-count" id="count3">0</span> -->
                </div>
                <div class="input-row">
                    <input id="input3" type="text" placeholder="Add a new task…" autocomplete="off">
                    <button id="addBtn3" aria-label="Add task">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="addElement3" class="task-list-wrap"></div>
            </div>

        </div>

    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-brand">© 2026 Raman</span>
            <div class="social-icons">
                <a href="https://www.linkedin.com/in/ramanpal21/" target="_blank" title="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="https://t.me/Raman_2170" target="_blank" title="Telegram">
                    <i class="fab fa-telegram"></i>
                </a>
                <a href="https://github.com/ramanpal2123" target="_blank" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </div>
    </footer>

    <div class="toast" id="toast">Please enter a task!</div>

    <script src="script.js"></script>
</body>
</html>
